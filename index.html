<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>متجر الملابس الجزائري - تشكيلة فريدة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #1e1e2a;
            line-height: 1.5;
            position: relative;
        }

        /* خلفية الموقع عالية الجودة - الصورة الأولى */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070&auto=format');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* طبقة شفافة فوق الخلفية لتفتيحها وإبراز المحتوى */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: rgba(255, 255, 255, 0.88);
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2b4c8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: #2c3e66;
            font-weight: 600;
            transition: 0.2s;
        }
        .nav-links a:hover {
            color: #e67e22;
        }
        .cart-icon {
            background: #1e3c72;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: default;
        }

        .hero {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(238, 238, 238, 0.5);
            border-radius: 0 0 30px 30px;
            margin: 0 1rem;
        }
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #1e2a3e;
        }
        .hero p {
            font-size: 1.2rem;
            color: #4a5568;
            max-width: 700px;
            margin: 0 auto;
        }

        .products-section {
            max-width: 1300px;
            margin: 3rem auto;
            padding: 0 2rem;
        }
        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            border-right: 6px solid #e67e22;
            padding-right: 1rem;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(5px);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.1);
            background: white;
        }
        .product-img {
            width: 100%;
            height: 300px;
            background: #eef2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .product-card:hover .product-img img {
            transform: scale(1.05);
        }
        .product-info {
            padding: 1.5rem;
        }
        .product-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .product-price {
            color: #e67e22;
            font-size: 1.3rem;
            font-weight: 800;
            margin: 0.5rem 0;
        }
        .product-desc {
            color: #4a5568;
            margin: 0.75rem 0;
            font-size: 0.9rem;
        }
        .order-btn {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 0.8rem 1rem;
            width: 100%;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .order-btn:hover {
            background: #e67e22;
            transform: scale(0.98);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            padding: 2rem;
            position: relative;
            animation: modalFadeIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .close-modal {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #666;
            transition: 0.2s;
        }
        .close-modal:hover {
            color: #e67e22;
        }
        .modal h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #1e3c72;
        }
        .modal .product-name-display {
            background: #f0f4f8;
            padding: 0.8rem;
            border-radius: 16px;
            margin: 1rem 0;
            font-weight: bold;
            color: #e67e22;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2c3e66;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #e67e22;
        }
        .submit-order {
            background: #e67e22;
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .submit-order:hover {
            background: #1e3c72;
        }
        .success-msg {
            background: #27ae60;
            color: white;
            padding: 0.8rem;
            border-radius: 16px;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            background: #1e2a3e;
            color: #ccc;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 700px) {
            .nav-container {
                flex-direction: column;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .product-img {
                height: 250px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">🇩🇿 ALGÉRIEN T-SHIRT</div>
        <ul class="nav-links">
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#products">المنتجات</a></li>
            <li><a href="#">تواصل</a></li>
        </ul>
        <div class="cart-icon">📦 اطلب مباشرة</div>
    </div>
</header>

<div class="hero">
    <h1>أرقى التيشيرتات الجزائرية</h1>
    <p>جودة عالية – تصميمات حصرية – شحن سريع لكل الولايات</p>
</div>

<div class="products-section" id="products">
    <h2 class="section-title">🔥 تشكيلتنا الأكثر مبيعاً</h2>
    <div class="products-grid" id="products-grid"></div>
</div>

<footer>
    <p>© 2025 المتجر الجزائري للملابس | اطلب عبر النموذج وسنوافيك بالتفاصيل</p>
</footer>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>📋 طلب المنتج</h3>
        <div class="product-name-display" id="modalProductName">المنتج</div>
        
        <form id="orderForm">
            <div class="form-group">
                <label>👤 الاسم الكامل</label>
                <input type="text" id="fullName" required placeholder="أدخل اسمك الكامل">
            </div>
            <div class="form-group">
                <label>📞 رقم الهاتف</label>
                <input type="tel" id="phone" required placeholder="مثال: 0555123456">
            </div>
            <div class="form-group">
                <label>📍 الولاية</label>
                <select id="wilaya" required>
                    <option value="">اختر الولاية</option>
                    <option>أدرار</option><option>الشلف</option><option>الأغواط</option><option>أم البواقي</option>
                    <option>باتنة</option><option>بجاية</option><option>بسكرة</option><option>بشار</option>
                    <option>البليدة</option><option>البويرة</option><option>تمنراست</option><option>تبسة</option>
                    <option>تلمسان</option><option>تيارت</option><option>تيزي وزو</option><option>الجزائر</option>
                    <option>الجلفة</option><option>جيجل</option><option>سطيف</option><option>سعيدة</option>
                    <option>سكيكدة</option><option>بلعباس</option><option>عنابة</option><option>قالمة</option>
                    <option>قسنطينة</option><option>المدية</option><option>مستغانم</option><option>المسيلة</option>
                    <option>معسكر</option><option>ورقلة</option><option>وهران</option><option>البيض</option>
                    <option>إليزي</option><option>برج بوعريريج</option><option>بومرداس</option><option>الطارف</option>
                    <option>تندوف</option><option>تيسمسيلت</option><option>الوادي</option><option>خنشلة</option>
                    <option>سوق أهراس</option><option>تيبازة</option><option>ميلة</option><option>عين الدفلى</option>
                    <option>النعامة</option><option>عين تيموشنت</option><option>غرداية</option><option>غليزان</option>
                </select>
            </div>
            <div class="form-group">
                <label>🏠 العنوان الكامل</label>
                <textarea id="address" rows="2" required placeholder="العنوان التفصيلي + الرمز البريدي"></textarea>
            </div>
            <div class="form-group">
                <label>📏 المقاس</label>
                <select id="size" required>
                    <option value="">اختر المقاس</option>
                    <option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
                </select>
            </div>
            <div class="form-group">
                <label>💬 ملاحظات إضافية (اختياري)</label>
                <textarea id="notes" rows="2" placeholder="أي طلبات خاصة..."></textarea>
            </div>
            <button type="submit" class="submit-order" id="submitBtn">✅ تأكيد الطلب</button>
            <div id="successMsg" class="success-msg"></div>
        </form>
    </div>
</div>

<script>
    // رابط Google Sheet الخاص بك
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwC-IozhGA_eP6n-Xu6ojigpsa6zzLGI5y0XZulWsJNde--uqu9vMqvYnAE3GtAlzgb/exec";
    
    const products = [
        {
            id: 1,
            name: "تيشيرت الأسد الأبيض",
            price: "2500 دج",
            desc: "قطن 100%، طباعة عالية الجودة، مقاسات من S إلى XXL",
            imageUrl: "https://b.top4top.io/p_38060w9on1.jpg"
        },
        {
            id: 2,
            name: "طماق الكوماندوس",
            price: "3200 دج",
            desc: "تصميم جزائري مميز، خامة مريحة للصيف",
            imageUrl: "https://b.top4top.io/p_38060w9on1.jpg"
        },
        {
            id: 3,
            name: "تيشيرت نخلة الجزائر",
            price: "2800 دج",
            desc: "نقشة النخلة والصحراء، أنيق وكاجوال",
            imageUrl: "https://b.top4top.io/p_38060w9on1.jpg"
        },
        {
            id: 4,
            name: "هودي الرياضة",
            price: "4500 دج",
            desc: "هودي بسحاب، جيب أمامي، ألوان محايدة",
            imageUrl: "https://b.top4top.io/p_38060w9on1.jpg"
        },
        {
            id: 5,
            name: "تيشيرت الخط المغاربي",
            price: "2700 دج",
            desc: "كتابة تقليدية، فخم وجذاب",
            imageUrl: "https://b.top4top.io/p_38060w9on1.jpg"
        },
        {
            id: 6,
            name: "كاب بيسبول",
            price: "1500 دج",
            desc: "قابل للتعديل، خامة قطنية ممتازة",
            imageUrl: "https://b.top4top.io/p_38060w9on1.jpg"
        }
    ];

    const productsGrid = document.getElementById('products-grid');
    const modal = document.getElementById('orderModal');
    const closeModalBtn = document.querySelector('.close-modal');
    const modalProductNameSpan = document.getElementById('modalProductName');
    const orderForm = document.getElementById('orderForm');
    const successMsgDiv = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');

    let currentProduct = null;

    function renderProducts() {
        productsGrid.innerHTML = '';
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-img">
                    <img src="${product.imageUrl}" alt="${product.name}" loading="lazy">
                </div>
                <div class="product-info">
                    <div class="product-title">${product.name}</div>
                    <div class="product-price">${product.price}</div>
                    <div class="product-desc">${product.desc}</div>
                    <button class="order-btn" data-id="${product.id}">📦 اطلب الآن</button>
                </div>
            `;
            productsGrid.appendChild(card);
        });

        document.querySelectorAll('.order-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const productId = parseInt(btn.getAttribute('data-id'));
                const product = products.find(p => p.id === productId);
                if (product) openOrderModal(product);
            });
        });
    }

    function openOrderModal(product) {
        currentProduct = product;
        modalProductNameSpan.textContent = `${product.name} - ${product.price}`;
        modal.style.display = 'flex';
        orderForm.reset();
        successMsgDiv.style.display = 'none';
        successMsgDiv.innerHTML = '';
        submitBtn.disabled = false;
        submitBtn.innerHTML = '✅ تأكيد الطلب';
    }

    function closeModal() {
        modal.style.display = 'none';
        currentProduct = null;
    }

    async function sendToGoogleSheet(orderData) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(orderData)
            });
            return true;
        } catch (error) {
            console.error('خطأ في الإرسال:', error);
            return false;
        }
    }

    async function handleOrderSubmit(event) {
        event.preventDefault();
        
        if (!currentProduct) {
            alert('حدث خطأ، يرجى المحاولة مرة أخرى.');
            return;
        }
        
        const fullName = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const wilaya = document.getElementById('wilaya').value;
        const address = document.getElementById('address').value.trim();
        const size = document.getElementById('size').value;
        const notes = document.getElementById('notes').value.trim();
        
        if (!fullName || !phone || !wilaya || !address || !size) {
            alert('الرجاء تعبئة جميع الحقول المطلوبة (*)');
            return;
        }
        
        const phoneRegex = /^[0-9]{9,12}$/;
        if (!phoneRegex.test(phone.replace(/\s/g, ''))) {
            alert('رقم الهاتف يجب أن يحتوي على أرقام فقط (9 إلى 12 رقم)');
            return;
        }
        
        const orderData = {
            product: currentProduct.name,
            price: currentProduct.price,
            fullName: fullName,
            phone: phone,
            wilaya: wilaya,
            address: address,
            size: size,
            notes: notes,
            orderDate: new Date().toLocaleString('ar-DZ'),
            status: 'جديد'
        };
        
        // حفظ في localStorage كنسخة احتياطية
        let orders = JSON.parse(localStorage.getItem('algoshop_orders')) || [];
        orders.push(orderData);
        localStorage.setItem('algoshop_orders', JSON.stringify(orders));
        
        // إظهار حالة التحميل
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> جاري الإرسال...';
        
        // إرسال إلى Google Sheet
        const sent = await sendToGoogleSheet(orderData);
        
        if (sent) {
            successMsgDiv.style.display = 'block';
            successMsgDiv.innerHTML = `✅ تم استلام طلبك بنجاح! <br> 📦 المنتج: ${currentProduct.name} <br> 📞 سنتصل بك قريباً على ${phone}`;
            
            setTimeout(() => {
                closeModal();
                alert('شكراً لك! تم تسجيل طلبك بنجاح. سيتم التواصل معك خلال 24 ساعة.');
            }, 2500);
        } else {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '✅ تأكيد الطلب';
            alert('حدث خطأ في إرسال الطلب. تم حفظه محلياً وسنقوم بمعالجته يدوياً. شكراً لك!');
            closeModal();
        }
    }
    
    closeModalBtn.addEventListener('click', closeModal);
    window.addEventListener('click', (event) => {
        if (event.target === modal) closeModal();
    });
    
    orderForm.addEventListener('submit', handleOrderSubmit);
    renderProducts();
</script>

</body>
</html>
